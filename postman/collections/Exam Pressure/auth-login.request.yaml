$kind: http-request
name: Auth Login
method: POST
url: '{{baseUrl}}/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{email}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const status = pm.response.code;

      // Basic status checks
      pm.test('Status is 200 (success) or 401 (invalid credentials)', function () {
        pm.expect([200, 401]).to.include(status);
      });

      // Response should be JSON (for both success and error)
      pm.test('Response is JSON', function () {
        pm.response.to.be.json;
      });

      let json;
      try {
        json = pm.response.json();
      } catch (e) {
        json = null;
      }

      if (status === 200) {
        pm.test('Has access token (access_token or token)', function () {
          pm.expect(json).to.be.an('object');
          pm.expect(
            (json && (json.access_token || json.token)),
            'Expected access_token or token in response'
          ).to.be.ok;
        });

        if (json && Object.prototype.hasOwnProperty.call(json, 'token_type')) {
          pm.test('Has token_type', function () {
            pm.expect(json.token_type, 'token_type should not be empty').to.be.ok;
          });
        }

        // Save token for subsequent requests
        const token = json && (json.access_token || json.token);
        if (token) {
          pm.environment.set('authToken', token);
        }
      }

      if (status === 401) {
        pm.test('401 response contains an error message', function () {
          pm.expect(json).to.be.an('object');
          const msg = json && (json.detail || json.message || json.error || json.msg);
          pm.expect(msg, 'Expected an error message field like detail/message/error/msg').to.be.ok;
        });
      }
