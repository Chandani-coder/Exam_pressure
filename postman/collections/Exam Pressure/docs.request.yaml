$kind: http-request
name: Docs
method: GET
url: '{{baseUrl}}/docs'
order: 10000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Content-Type contains text/html', function () {
        pm.expect(pm.response.headers.get('Content-Type') || '').to.include('text/html');
      });

      pm.test("Body includes 'Swagger UI' or 'swagger-ui'", function () {
        const body = pm.response.text();
        pm.expect(body.toLowerCase()).to.satisfy(t => t.includes('swagger ui') || t.includes('swagger-ui'));
      });
